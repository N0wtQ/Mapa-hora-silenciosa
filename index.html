<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mapa de Espacios Silenciosos · España</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ink:        #1a1a2e;
    --soft-ink:   #3d3d5c;
    --mist:       #f0eff8;
    --fog:        #e4e3f0;
    --white:      #fafafa;
    --border:     #d8d7e8;
    --shadow:     0 2px 12px rgba(26,26,46,0.10);
    --shadow-lg:  0 6px 28px rgba(26,26,46,0.16);
    --r:          10px;
    --font-head:  'DM Serif Display', Georgia, serif;
    --font-body:  'DM Sans', system-ui, sans-serif;
    --transition: 200ms ease;
    --c-super:    #2a9d8f;
    --c-super-d:  #e8f7f5;
    --c-bib:      #d4a017;
    --c-bib-d:    #fdf6e3;
    --c-nat:      #40916c;
    --c-nat-d:    #d8f3dc;
    --c-civico:   #4895ef;
    --c-civico-d: #e3f2fd;
    --c-sun:      #f4c430;
    --c-sun-d:    #fffbe6;
    --c-aero:     #5e60ce;
    --c-aero-d:   #eef0ff;
    --c-cultura:  #e76f51;
    --c-cultura-d:#fff0ed;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--mist);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  #header {
    background: var(--ink); color: var(--white);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    flex-shrink: 0; box-shadow: var(--shadow-lg); z-index: 1000;
  }
  .header-icon { font-size: 26px; flex-shrink: 0; }
  #header h1 { font-family: var(--font-head); font-size: 18px; font-weight: 400; line-height: 1.2; flex: 1; }
  #header h1 span { font-style: italic; color: #52c9b9; }
  #header p.subtitle { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }

  /* TOOLBAR */
  #toolbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 7px 14px; display: flex; align-items: center; gap: 6px;
    flex-shrink: 0; z-index: 999; overflow-x: auto; scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
  .tb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--soft-ink); flex-shrink: 0; white-space: nowrap; }
  .chip {
    display: flex; align-items: center; gap: 5px; padding: 4px 11px;
    border-radius: 20px; border: 1.5px solid var(--border); background: var(--white);
    font-family: var(--font-body); font-size: 11.5px; font-weight: 500; color: var(--soft-ink);
    cursor: pointer; transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
  }
  .chip:hover { border-color: var(--soft-ink); }
  .chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .chip.active[data-cat="supermercado"]     { background: var(--c-super);   border-color: var(--c-super);   color:#fff; }
  .chip.active[data-cat="biblioteca"]       { background: var(--c-bib);     border-color: var(--c-bib);     color:#fff; }
  .chip.active[data-cat="espacio_natural"]  { background: var(--c-nat);     border-color: var(--c-nat);     color:#fff; }
  .chip.active[data-cat="centro_comercial"] { background: var(--c-super);   border-color: var(--c-super);   color:#fff; }
  .chip.active[data-cat="aeropuerto"]       { background: var(--c-aero);    border-color: var(--c-aero);    color:#fff; }
  .chip.active[data-cat="sunflower"]        { background: var(--c-sun);     border-color: var(--c-sun);     color: var(--ink); }
  .chip.active[data-cat="cultura"]          { background: var(--c-cultura); border-color: var(--c-cultura); color:#fff; }
  .chip.active[data-cat="centro_civico"]    { background: var(--c-civico);  border-color: var(--c-civico);  color:#fff; }
  .spacer { flex: 1; min-width: 8px; }
  #btn-suggest {
    display: flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid var(--c-super); background: var(--c-super); color: white;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all var(--transition); text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  #btn-suggest:hover { background: var(--ink); border-color: var(--ink); }

  /* MAP */
  #map-container { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  /* LEAFLET */
  .leaflet-popup-content-wrapper {
    border-radius: var(--r) !important; box-shadow: var(--shadow-lg) !important;
    padding: 0 !important; overflow: hidden; font-family: var(--font-body) !important;
    min-width: 260px; max-width: 330px;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button { color: var(--soft-ink) !important; font-size: 20px !important; top: 8px !important; right: 10px !important; z-index: 10; }

  /* POPUP */
  .pop-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .pop-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .pop-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 12px;
  }
  .badge-supermercado     { background: var(--c-super-d);   color: var(--c-super); }
  .badge-biblioteca       { background: var(--c-bib-d);     color: #7a5c00; }
  .badge-sala_estudio     { background: var(--c-bib-d);     color: #7a5c00; }
  .badge-espacio_natural  { background: var(--c-nat-d);     color: var(--c-nat); }
  .badge-centro_civico    { background: var(--c-civico-d);  color: var(--c-civico); }
  .badge-centro_comercial { background: var(--c-super-d);   color: var(--c-super); }
  .badge-aeropuerto       { background: var(--c-aero-d);    color: var(--c-aero); }
  .badge-sunflower        { background: var(--c-sun-d);     color: #7a6000; }
  .badge-cultura          { background: var(--c-cultura-d); color: var(--c-cultura); }
  .badge-default          { background: var(--fog);         color: var(--soft-ink); }
  .pop-verif {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 10px;
  }
  .verif-VERIFICADO    { background: #e8f5e9; color: #2e7d32; }
  .verif-PENDIENTE     { background: var(--c-bib-d); color: #7a5c00; }
  .verif-NO_VERIFICADO { background: #fce4ec; color: #b71c1c; }
  .pop-nombre { font-family: var(--font-head); font-size: 15px; line-height: 1.3; color: var(--ink); font-weight: 400; }
  .pop-body { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 6px; }
  .pop-row { display: flex; gap: 8px; align-items: flex-start; font-size: 12.5px; color: var(--soft-ink); line-height: 1.4; }
  .pop-row .ico { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
  .pop-hs {
    background: var(--c-super-d); border: 1px solid #52c9b9; border-radius: 6px;
    padding: 6px 10px; font-size: 12px; color: var(--ink); display: flex; align-items: center; gap: 6px;
  }
  .pop-info {
    background: var(--c-sun-d); border: 1px solid var(--c-sun); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; color: var(--ink); display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
  }
  .pop-info.aero { background: var(--c-aero-d); border-color: var(--c-aero); }
  .pop-fuente {
    display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--soft-ink);
    padding-top: 4px; border-top: 1px solid var(--border); margin-top: 4px;
  }
  .pop-fuente a { color: var(--c-super); text-decoration: none; word-break: break-all; }
  .pop-fuente a:hover { text-decoration: underline; }

  /* MARKERS */
  .marker-wrap { width: 34px; height: 40px; }
  .marker-body {
    width: 34px; height: 34px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.25);
  }
  .marker-icon { transform: rotate(45deg); font-size: 15px; line-height: 1; }
  .m-supermercado     { background: var(--c-super); }
  .m-biblioteca       { background: var(--c-bib); }
  .m-sala_estudio     { background: var(--c-bib); }
  .m-espacio_natural  { background: var(--c-nat); }
  .m-centro_comercial { background: var(--c-super); }
  .m-centro_civico    { background: var(--c-civico); }
  .m-aeropuerto       { background: var(--c-aero); }
  .m-sunflower        { background: var(--c-sun); }
  .m-cultura          { background: var(--c-cultura); }
  .m-default          { background: var(--soft-ink); }

  /* LEGEND */
  #legend {
    position: absolute; bottom: 24px; right: 12px;
    background: var(--white); border: 1px solid var(--border); border-radius: var(--r);
    padding: 12px 14px; box-shadow: var(--shadow); z-index: 500; min-width: 185px;
    font-size: 11.5px; color: var(--soft-ink);
  }
  #legend h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink); margin-bottom: 8px; }
  .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  /* COUNT */
  #count-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--white); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; font-size: 11.5px; font-weight: 500; color: var(--soft-ink);
    box-shadow: var(--shadow); z-index: 500; pointer-events: none;
  }
  #count-badge b { color: var(--ink); }

  @media (max-width: 600px) {
    #header h1 { font-size: 15px; }
    #legend { display: none; }
    .leaflet-popup-content-wrapper { max-width: 290px; }
  }
</style>
</head>
<body>

<header id="header">
  <div class="header-icon">🤫</div>
  <div>
    <h1>Espacios <span>silenciosos</span> · España</h1>
    <p class="subtitle">Lugares tranquilos · Hora silenciosa · TEA · Discapacidad invisible</p>
  </div>
</header>

<div id="toolbar">
  <span class="tb-label">Filtrar</span>
  <button class="chip active" data-cat="all"              onclick="ft('all')">🗺️ Todos</button>
  <button class="chip"        data-cat="supermercado"     onclick="ft('supermercado')">🛒 Hora silenciosa</button>
  <button class="chip"        data-cat="centro_comercial" onclick="ft('centro_comercial')">🏬 C. Comercial</button>
  <button class="chip"        data-cat="aeropuerto"       onclick="ft('aeropuerto')">✈️ Aeropuertos</button>
  <button class="chip"        data-cat="sunflower"        onclick="ft('sunflower')">🌻 Discap. invisible</button>
  <button class="chip"        data-cat="biblioteca"       onclick="ft('biblioteca')">📚 Bibliotecas</button>
  <button class="chip"        data-cat="espacio_natural"  onclick="ft('espacio_natural')">🌿 Naturaleza</button>
  <button class="chip"        data-cat="cultura"          onclick="ft('cultura')">🎭 Cultura</button>
  <button class="chip"        data-cat="centro_civico"    onclick="ft('centro_civico')">🏛️ Cívico</button>
  <div class="spacer"></div>
  <a id="btn-suggest" href="#" onclick="openSuggest();return false;">＋ Sugerir lugar</a>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="count-badge"><b id="count-num">–</b> lugares visibles</div>
  <div id="legend">
    <h4>Leyenda</h4>
    <div class="leg-row"><span class="leg-dot" style="background:#2a9d8f"></span>Hora silenciosa / CC</div>
    <div class="leg-row"><span class="leg-dot" style="background:#5e60ce"></span>Aeropuerto</div>
    <div class="leg-row"><span class="leg-dot" style="background:#f4c430"></span>Discapacidad invisible 🌻</div>
    <div class="leg-row"><span class="leg-dot" style="background:#d4a017"></span>Biblioteca / Estudio</div>
    <div class="leg-row"><span class="leg-dot" style="background:#40916c"></span>Espacio natural</div>
    <div class="leg-row"><span class="leg-dot" style="background:#e76f51"></span>Cultura</div>
    <div class="leg-row"><span class="leg-dot" style="background:#4895ef"></span>Centro cívico</div>
  </div>
</div>

<script>
const TIPO_ICON  = { supermercado:"🛒",biblioteca:"📚",sala_estudio:"✏️",espacio_natural:"🌿",centro_civico:"🏛️",centro_comercial:"🏬",aeropuerto:"✈️",sunflower:"🌻",cultura:"🎭",museo:"🎨",hotel:"🏨",coworking:"💼",otro:"📍" };
const TIPO_LABEL = { supermercado:"Hora silenciosa",biblioteca:"Biblioteca / Estudio",sala_estudio:"Sala de estudio",espacio_natural:"Espacio natural",centro_civico:"Centro cívico",centro_comercial:"Centro comercial",aeropuerto:"Aeropuerto",sunflower:"Discapacidad invisible 🌻",cultura:"Cultura",museo:"Museo",hotel:"Hotel",coworking:"Coworking",otro:"Otro" };
const ic = t => TIPO_ICON[t]  || "📍";
const lb = t => TIPO_LABEL[t] || t;

function mkMarker(tipo) {
  return L.divIcon({ className:"", iconSize:[34,40], iconAnchor:[17,40], popupAnchor:[0,-42],
    html:`<div class="marker-wrap"><div class="marker-body m-${tipo||'default'}"><span class="marker-icon">${ic(tipo)}</span></div></div>`
  });
}

function mkPopup(p) {
  const t  = p.tipo || "default";
  const vi = p.verificacion === "VERIFICADO" ? "✓" : "⏳";
  const vc = `verif-${p.verificacion||"PENDIENTE"}`;
  const hs = p.hora_silenciosa
    ? `<div class="pop-hs"><span>🤫</span><div><b>Hora silenciosa</b><br>${p.hora_silenciosa}</div></div>` : "";
  let info = "";
  if (t === "sunflower") {
    info = `<div class="pop-info"><span>🌻</span><div>Establecimientos adheridos al programa <b>Hidden Disabilities Sunflower</b>. El personal reconoce el cordón de girasol y ofrece ayuda discreta.<br><a href="https://hdsunflower.com/find-the-sunflower" target="_blank" rel="noopener">Ver mapa oficial →</a></div></div>`;
  } else if (t === "aeropuerto" && p.fuente_tramite) {
    info = `<div class="pop-info aero"><span>♿</span><div>Solicita el <b>Distintivo de Discapacidad Invisible de AENA</b> antes de tu vuelo:<br><a href="${p.fuente_tramite}" target="_blank" rel="noopener">Formulario AENA →</a></div></div>`;
  }
  const dir  = p.direccion       ? `<div class="pop-row"><span class="ico">📍</span><span>${p.direccion}</span></div>` : "";
  const hor  = p.horario_general ? `<div class="pop-row"><span class="ico">🕐</span><span>${p.horario_general}</span></div>` : "";
  const desc = p.descripcion     ? `<div class="pop-row"><span class="ico">ℹ️</span><span>${p.descripcion}</span></div>` : "";
  const src  = p.fuente_url      ? `<div class="pop-fuente">🔗 <a href="${p.fuente_url}" target="_blank" rel="noopener">Fuente verificada</a></div>` : "";
  return `<div class="pop-header"><div class="pop-meta"><span class="pop-badge badge-${t}">${ic(t)} ${lb(t)}</span><span class="pop-verif ${vc}">${vi} ${p.verificacion||"Pendiente"}</span></div><div class="pop-nombre">${p.nombre}</div></div><div class="pop-body">${hs}${info}${dir}${hor}${desc}${src}</div>`;
}

// ── MAP ──
const map = L.map("map",{center:[40.2,-3.6],zoom:6});
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains:"abcd",maxZoom:19
}).addTo(map);

// ── DATA ──
const FEATURES = [
  // SUPERMERCADOS
  // Carrefour — pin informativo central (la cadena tiene cientos de tiendas en toda España)
  {c:[-3.6826,40.4015],p:{id:"REAL-001",nombre:"Carrefour España — Hora silenciosa en todos sus centros",tipo:"supermercado",subtipo:"hora_silenciosa",direccion:"Todos los hipermercados y 147 centros Carrefour Market en España",ciudad:"España (red nacional)",horario_general:"Variable por centro",hora_silenciosa:"Todos los días: 15:00–16:00",descripcion:"Primera cadena en implantar la Hora Silenciosa en España (julio 2021). Sin música, sin megafonía salvo emergencias, reducción lumínica y sonido de cajas. Este pin es informativo — busca tu Carrefour más cercano en su web.",fuente_url:"https://autismo.org.es/actualidad/noticias/carrefour-espana-extiende-la-hora-silenciosa-a-favor-de-las-personas-con-autismo-e-hipersensibilidad-sensorial-a-sus-centros-carrefour-market/",verificacion:"VERIFICADO"}},

  // Altoaragón — 15 tiendas con hora silenciosa verificadas (fuente: cabreroehijos.es/tiendas + igastroaragon.com)
  // Huesca capital (8 tiendas)
  {c:[-0.4133,42.1401],p:{id:"REAL-002a",nombre:"Altoaragón — Huesca 1 (Ramón y Cajal)",tipo:"supermercado",subtipo:"hora_silenciosa",direccion:"P. Ramón y Cajal 1-3, 22001 Huesca",ciudad:"Huesca",comunidad_autonoma:"Aragón",horario_general:"Lun–Sáb: 09:00–21:00",hora_silenciosa:"Todos los días: 15:00–16:00",descripcion:"Sin música, sin megafonía, reducción lumínica.",fuente_url:"https://www.cabreroehijos.es/s_huesca1",verificacion:"VERIFICADO"}},
  {c:[-0.4089,42.1368],p:{id:"REAL-002b",nombre:"Altoaragón — Huesca 2 (Menéndez Pidal)",tipo:"supermercado",subtipo:"hora_silenciosa",direccion:"Avda. Menéndez Pidal 11, 22003 Huesca",ciudad:"Huesca",comunidad_autonoma:"Aragón",horario_general:"Lun–Sáb: 09:00–21:00",hora_silenciosa:"Todos los días: 15:00–16:00",descripcion:"Sin música, sin megafonía, reducción lumínica.",fuente_url:"https://www.cabreroehijos.es/s_huesca2",verificacion:"VERIFICADO"}},
  {c:[-0.4097,42.1385],p:{id:"REAL-002c",nombre:"Altoaragón — Huesca 3 (Zaragoza)",tipo:"supermercado",subtipo:"hora_silenciosa",direccion:"C/ Zaragoza 11, 22002 Huesca",ciudad:"Huesca",comunidad_autonoma:"Aragón",horario_general:"Lun–Sáb: 09:00–21:00",hora_silenciosa:"Todos los días: 15:00–16:00",descripcion:"Sin música, sin megafonía, reducción lumínica.",fuente_url:"https://www.cabreroehijos.es/s_huesca3",verificacion:"VERIFICADO"}},
  {c:[-0.4250,42.1450],p:{id:"REAL-002d",nombre:"Altoaragón — Huesca 4 (Pirineos)",tipo:"supermercado",subtipo:"hora_silenciosa",direccion:"Avda. Pirineos 10-12, 22002 Huesca",ciudad:"Huesca",comunidad_autonoma:"Aragón",horario_general:"Lun–Sáb: 09:00–21:00",hora_silenciosa:"Todos los días: 15:00–16:00",descripcion:"Sin música, sin megafonía, reducción lumínica.",fuente_url:"https://www.cabreroehijos.es/s_huesca4",verificacion:"VERIFICADO"}},

const lyr  = L.layerGroup().addTo(map);
const mkrs = FEATURES.map(({c,p}) => {
  const m = L.marker([c[1],c[0]], {icon:mkMarker(p.tipo)});
  m.bindPopup(mkPopup(p), {maxWidth:330});
  m._tipo = p.tipo;
  return m;
});

let active = "all";
function render() {
  lyr.clearLayers();
  const vis = mkrs.filter(m => active === "all" || m._tipo === active);
  vis.forEach(m => lyr.addLayer(m));
  document.getElementById("count-num").textContent = vis.length;
}
function ft(cat) {
  active = cat;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.cat === cat));
  render();
}
